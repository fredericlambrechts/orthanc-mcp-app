<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DICOM Viewer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        color: #ececec;
        font:
          14px/1.4 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      #viewer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #000;
      }
      #status {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.75);
        border-radius: 4px;
        font-size: 12px;
        pointer-events: none;
        z-index: 10;
      }
      #status.hidden {
        display: none;
      }
      #placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
        z-index: 5;
      }
      #placeholder.hidden {
        display: none;
      }
      #placeholder h1 {
        font-weight: 500;
        font-size: 18px;
        margin-bottom: 8px;
      }
      #placeholder p {
        color: #a3a3a3;
        max-width: 520px;
        margin: 4px auto;
        font-size: 13px;
      }
      #placeholder .disclaimer {
        margin-top: 24px;
        color: #8a8a8a;
        font-size: 11px;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="placeholder">
      <div>
        <h1>DICOM viewer - widget build v0.2.0</h1>
        <p>Ask Claude to open a DICOM study to load it here.</p>
        <p>Any DICOMweb URL works - paste a study link or provide a StudyInstanceUID.</p>
        <p class="disclaimer">For demonstration, education, and non-diagnostic use only.</p>
        <p id="diag" style="margin-top:24px; font-family:ui-monospace,monospace; font-size:11px; color:#6b7fff; line-height:1.6;">
          widget js: loading...<br/>
          app.connect: waiting<br/>
          ontoolresult: waiting
        </p>
      </div>
    </div>
    <div id="status" class="hidden"></div>
    <iframe id="viewer" title="OHIF viewer" allow="fullscreen"></iframe>
    <script type="module" src="/src/widget.ts"></script>
  </body>
</html>
