app = "orthanc-mcp-app"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOST = "0.0.0.0"
  # Set via `fly secrets set PUBLIC_ORIGIN=https://orthanc-mcp-app.fly.dev`
  # before first deploy so the widget's CSP lists the right origin.

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine warm so demos don't pay the cold-start tax (~5-15s).
  # Cost: ~$4/month for a shared-cpu-1x always-on machine, well inside the
  # Fly Hobby free-tier allowance. Revisit if traffic stays near zero.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
